async function pruneCloudBackups(){if(cloudBackups.length<=BACKUP_RETENTION_DAYS)return;const old=cloudBackups.slice(BACKUP_RETENTION_DAYS);for(const item of old){await deleteCloudBackup(item.id)}cloudBackups=cloudBackups.slice(0,BACKUP_RETENTION_DAYS)}
async function ensureDailyCloudBackup(snapshotState=state){cloudBackupError='';try{await fetchCloudBackups();const latest=cloudBackups[0];const latestTime=latest&&latest.updated_at?new Date(latest.updated_at).getTime():0;if(!latestTime||Date.now()-latestTime>=BACKUP_INTERVAL_MS){const id=BACKUP_PREFIX+localDateId();await writeCloudRow(id,clone(snapshotState));await fetchCloudBackups()}await pruneCloudBackups();if(view==='config'&&cloudSynced)render()}catch(err){console.error('Erro no backup automático',err);cloudBackupError=String(err.message||err);if(view==='config'&&cloudSynced)render()}}
async function refreshBackupList(){cloudBackupError='';try{await fetchCloudBackups();if(view==='config')render()}catch(err){cloudBackupError=String(err.message||err);if(view==='config')render()}}
async function restoreCloudBackup(id){if(!cloudSynced)return alert('Aguarde a sincronização da nuvem.');const info=backupDisplayDate(id);if(!confirm(`Restaurar o backup de ${info.day}?\n\nO estado atual será substituído na nuvem e em todos os aparelhos na próxima abertura.`))return;setCloudStatus('Restaurando backup...','loading');try{const res=await fetch(cloudTableUrl(`id=eq.${encodeURIComponent(id)}&select=data,updated_at`),{headers:cloudReadHeaders()});if(!res.ok)throw new Error(await parseCloudError(res));const rows=await res.json();if(!rows||!rows.length||!rows[0].data)throw new Error('Backup não encontrado.');const restored=merge(clone(baseData),rows[0].data);await writeCloudRow(SUPABASE_ROW_ID,restored);state=restored;cacheCloudState();lastCloudUpdatedAt=new Date().toISOString();setCloudStatus('Backup restaurado','ok');closeModal();render();alert('Backup restaurado com sucesso.')}catch(err){console.error(err);setCloudStatus('Erro na restauração','error');alert('Não foi possível restaurar o backup: '+String(err.message||err))}}
function backupManagerCard(){const latest=cloudBackups[0];const latestInfo=latest?backupDisplayDate(latest.id,latest.updated_at):null;const rows=cloudBackups.slice(0,BACKUP_RETENTION_DAYS).map(b=>{const d=backupDisplayDate(b.id,b.updated_at);return `<div class="backup-row"><div class="backup-row-main"><strong>${d.day}</strong><small>Snapshot salvo em ${d.time||'horário não informado'} · ${b.id}</small></div><button class="tiny" onclick="restoreCloudBackup('${b.id}')">Restaurar este dia</button></div>`}).join('');return `<div class="card backup-card"><div class="section-title"><div><h3>Backups automáticos da nuvem</h3><span>Um snapshot a cada 24 horas · retenção dos últimos ${BACKUP_RETENTION_DAYS}</span></div><button class="tiny" onclick="refreshBackupList()">Atualizar lista</button></div><div class="backup-summary"><div class="backup-stat"><span>Backups disponíveis</span><strong>${cloudBackups.length}</strong></div><div class="backup-stat"><span>Backup mais recente</span><strong>${latestInfo?latestInfo.day:'Ainda não criado'}</strong></div><div class="backup-stat"><span>Fonte ativa</span><strong>Nuvem Supabase</strong></div></div>${cloudBackupError?`<div class="backup-warning">O estado principal sincronizou, mas os backups versionados apresentaram erro: ${escapeHtml(cloudBackupError)}</div>`:`<div class="backup-ok">O app abre bloqueado, baixa primeiro o estado principal da nuvem e só então libera as edições.</div>`}<div class="backup-list">${rows||'<div class="empty">Nenhum snapshot disponível ainda. O primeiro será criado automaticamente.</div>'}</div></div>`}

function getAuthClient(){
  if(authClient)return authClient;
  if(!window.supabase?.createClient)throw new Error('Não foi possível carregar o módulo de autenticação. Verifique sua conexão e tente novamente.');
  authClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{auth:{persistSession:true,autoRefreshToken:true,detectSessionInUrl:true,storageKey:AUTH_STORAGE_KEY}});
  return authClient;
}
function authInitials(){const email=String(authUser?.email||'U');return email.slice(0,2).toUpperCase()}
function authErrorMessage(err){
  const raw=String(err?.message||err||'Não foi possível concluir a operação.');
  const low=raw.toLowerCase();
  if(low.includes('invalid login credentials'))return 'E-mail ou senha incorretos.';
  if(low.includes('email not confirmed'))return 'Confirme seu e-mail antes de entrar.';
  if(low.includes('user already registered'))return 'Já existe uma conta com este e-mail.';
  if(low.includes('password should be at least')||low.includes('weak password'))return 'A senha precisa ter pelo menos 8 caracteres e não pode ser muito fraca.';
  if(low.includes('rate limit')||low.includes('email rate limit'))return 'Muitas tentativas em pouco tempo. Aguarde alguns minutos e tente novamente.';
  if(low.includes('signup is disabled'))return 'A criação de novas contas está desativada no Supabase.';
  if(low.includes('failed to fetch')||low.includes('network'))return 'Não foi possível conectar ao servidor. Verifique a internet.';
  return raw;
}
function authRedirectUrl(){
  if(location.protocol==='file:')return location.href.split('#')[0];
  return location.origin+location.pathname;
}

function showAuthMode(mode){authBusy=false;authError='';authNotice='';if(mode==='register'&&!PUBLIC_SIGNUP_ENABLED){authNotice='Novos cadastros estão encerrados. Entre com uma conta já autorizada.';mode='login'}renderAuthGate(mode)}
async function submitLogin(event){
  event.preventDefault();const f=new FormData(event.target),email=String(f.get('email')||'').trim(),password=String(f.get('password')||'');
  authBusy=true;authError='';authNotice='';renderAuthGate('login');
  try{const {data,error}=await getAuthClient().auth.signInWithPassword({email,password});if(error)throw error;if(!data.session)throw new Error('O servidor não retornou uma sessão válida.');await enterAuthenticatedSession(data.session,true)}catch(err){authBusy=false;authError=authErrorMessage(err);renderAuthGate('login')}
}
async function submitRegister(event){
  event.preventDefault();
  authBusy=false;
  authError='';
  authNotice='Novos cadastros estão encerrados. Entre com uma conta já autorizada.';
  renderAuthGate('login');
}
async function submitForgotPassword(event){
  event.preventDefault();const email=String(new FormData(event.target).get('email')||'').trim();
  authBusy=true;authError='';authNotice='';renderAuthGate('forgot');
  try{const {error}=await getAuthClient().auth.resetPasswordForEmail(email,{redirectTo:authRedirectUrl()});if(error)throw error;authBusy=false;authNotice='Se esse e-mail estiver cadastrado, o link de recuperação foi enviado. Verifique também o spam.';renderAuthGate('forgot')}catch(err){authBusy=false;authError=authErrorMessage(err);renderAuthGate('forgot')}
}
async function submitNewPassword(event){
  event.preventDefault();const f=new FormData(event.target),password=String(f.get('password')||''),confirmPassword=String(f.get('confirmPassword')||'');
  if(password!==confirmPassword){authError='As senhas não são iguais.';return renderAuthGate('reset')}
  authBusy=true;authError='';authNotice='';renderAuthGate('reset');
  try{const {data,error}=await getAuthClient().auth.updateUser({password});if(error)throw error;authBusy=false;authNotice='Senha atualizada com sucesso.';recoveryMode=false;history.replaceState(null,document.title,location.pathname+location.search);authUser=data.user||authUser;cloudReady=false;cloudSynced=false;initCloud()}catch(err){authBusy=false;authError=authErrorMessage(err);renderAuthGate('reset')}
}
async function enterAuthenticatedSession(session,force=false){
  if(!session?.user)return renderAuthGate('login');
  const changed=!authUser||authUser.id!==session.user.id;
  authSession=session;authUser=session.user;authBusy=false;authError='';
  if(recoveryMode){renderAuthGate('reset');return}
  if(changed){state=clone(baseData);cloudReady=false;cloudSynced=false;cloudLoadError='';}
  if(force||(!cloudSynced&&!cloudLoading))initCloud();else if(cloudSynced)render();
}
async function handleAuthEvent(event,session){
  if(event==='PASSWORD_RECOVERY'){authSession=session;authUser=session?.user||null;recoveryMode=true;authBusy=false;authError='';authNotice='';renderAuthGate('reset');return}
  if(event==='SIGNED_OUT'){authSession=null;authUser=null;cloudReady=false;cloudSynced=false;cloudLoading=false;clearTimeout(cloudSaveTimer);closeModal();renderAuthGate('login');return}
  if(session){authSession=session;authUser=session.user;if(event==='SIGNED_IN'||event==='INITIAL_SESSION'){if(!recoveryMode&&!cloudSynced&&!cloudLoading)initCloud()}else if((event==='TOKEN_REFRESHED'||event==='USER_UPDATED')&&cloudSynced){render()}}
}
async function initAuth(){
  renderAuthGate('loading');
  try{const client=getAuthClient();if(!authSubscription){const listener=client.auth.onAuthStateChange((event,session)=>setTimeout(()=>handleAuthEvent(event,session),0));authSubscription=listener.data.subscription}const {data,error}=await client.auth.getSession();if(error)throw error;if(recoveryMode&&data.session){authSession=data.session;authUser=data.session.user;renderAuthGate('reset')}else if(data.session){await enterAuthenticatedSession(data.session)}else{authBusy=false;renderAuthGate('login')}}catch(err){authBusy=false;authError=authErrorMessage(err);renderAuthGate('login')}
}
async function logoutUser(){

  try{clearTimeout(cloudSaveTimer);if(cloudSynced)await saveToCloud();await getAuthClient().auth.signOut()}catch(err){alert(authErrorMessage(err))}
}

function renderCloudGate(mode='loading',detail=''){const loading=mode==='loading';document.getElementById('app').innerHTML=`<div class="sync-gate"><div class="sync-gate-card"><div class="sync-gate-icon">${loading?'↻':'!'}</div><h2>${loading?'Sincronizando com a nuvem':'Não foi possível abrir os dados'}</h2><p>${loading?'O app está buscando o estado mais recente no Supabase. As edições serão liberadas somente após a sincronização terminar.':'O modo local não foi liberado para evitar versões diferentes entre celular e computador.'}</p>${loading?'<div class="sync-gate-progress"><i></i></div>':''}${detail?`<p class="sync-gate-detail">${escapeHtml(detail)}</p>`:''}${loading?'':`<div class="sync-gate-actions"><button class="btn" onclick="retryCloudSync()">Tentar novamente</button><button class="btn secondary" onclick="exportLocalEmergencyCopy()">Exportar cache local</button></div>`}</div></div>`}
function exportLocalEmergencyCopy(){const cached=loadLocalCache();downloadJSONFile({exportedAt:new Date().toISOString(),source:'cache-local-de-emergencia',state:cached},`cache-local-emergencia-${localDateId()}.json`)}
function retryCloudSync(){initCloud()}
async function loadFromCloud(){setCloudStatus('Carregando nuvem...','loading');renderCloudGate('loading');try{const res=await fetch(cloudTableUrl(`id=eq.${encodeURIComponent(SUPABASE_ROW_ID)}&select=data,updated_at`),{headers:cloudReadHeaders(),cache:'no-store'});if(!res.ok)throw new Error(await parseCloudError(res));const rows=await res.json();if(rows&&rows.length&&rows[0].data){state=merge(clone(baseData),rows[0].data);lastCloudUpdatedAt=rows[0].updated_at||''}else{const seed=loadLocalCache();state=merge(clone(baseData),seed);setCloudStatus('Criando estado na nuvem...','loading');await writeCloudRow(SUPABASE_ROW_ID,state);lastCloudUpdatedAt=new Date().toISOString()}ensureUiState();cacheCloudState();const openingSnapshot=clone(state);cloudReady=true;cloudSynced=true;cloudLoadError='';setCloudStatus('Nuvem sincronizada','ok');render();ensureDailyCloudBackup(openingSnapshot)}catch(err){console.error('Erro ao carregar do Supabase',err);cloudReady=false;cloudSynced=false;cloudLoadError=String(err.message||err);setCloudStatus('Nuvem indisponível','error');renderCloudGate('error',cloudLoadError)}}
function initCloud(){if(!authUser){renderAuthGate('login');return}if(cloudLoading)return;clearTimeout(cloudSaveTimer);cloudReady=false;cloudSynced=false;cloudLoadError='';cloudLoading=true;loadFromCloud().finally(()=>{cloudLoading=false})}
const months=()=>state.months.map(m=>m.id); const fmt=v=>{const n=Number(v)||0;return `<span class="money${n<0?' negative-value':''}">${n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</span>`}; const pct=(v,t)=>{const base=Number(t||0),ratio=base?(Number(v||0)/base)*100:0;return `<span class="percent${ratio<0?' negative-value':''}">${ratio.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})}%</span>`}; const fmtDate=d=>{const s=String(d||'');const m=s.match(/^(\d{4})-(\d{2})-(\d{2})/);return m?`${m[3]}/${m[2]}/${m[1]}`:s}; const labelMonth=id=>(state.months.find(m=>m.id===id)||{label:id}).label; function setView(v){view=v;selectedExpenseCat=null;revenueScope='ano';expenseScope='ano';rxdScope='ano';periodMode='ano';if(v==='lancamentos'){state.month=validMonth(currentMonthId());txScope='mes';if(!['acompanhamento','realizados','envelopes','remanejamentos'].includes(txPanel))txPanel='acompanhamento';save()}else{txScope='ano'}render()} function currentMonthId(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')} function validMonth(m){if(months().includes(m))return m;const y=String(m||'').slice(0,4);return months().find(x=>x.startsWith(y))||months()[0]||m} function setMonth(m){state.month=validMonth(m);save();render()} function cat(id){return state.categories.find(c=>c.id===id)||{id,name:id,color:'#667085'}} function cityOf(sub=''){return String(sub||'').includes('Bras')?'Brasília':String(sub||'').includes('Fortaleza')?'Fortaleza':'Compartilhado'} function ownerOf(city=''){return city==='Fortaleza'?'Cícero':city==='Brasília'?'Nilce':'Compartilhado'} function cleanName(txt=''){let out=String(txt||'').trim(),before='';while(out&&out!==before){before=out;out=out.replace(/\s*[-–—]\s*(Fortaleza|Brasília|Brasilia|Compartilhado|Cícero|Cicero|Nilce)\s*$/i,'').trim()}return out} function norm(txt=''){return String(txt||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()} function textCmp(a,b){return norm(a).localeCompare(norm(b),'pt-BR',{sensitivity:'base'})} function expenseSortMeta(x){const catId=x.catId||x.cat||'';const sub=cleanName(x.sub||x.name||x.description||x.desc||'');const desc=cleanName(x.description||x.desc||x.name||x.sub||'');const value=Number(x.total??x.planned??x.amount??0)||0;return{cat:cat(catId).name,sub,desc,value}} function compareExpenseItems(a,b){const A=expenseSortMeta(a),B=expenseSortMeta(b);return textCmp(A.cat,B.cat)||textCmp(A.sub,B.sub)||textCmp(A.desc,B.desc)||(B.value-A.value)} function cardOf(v){const x=String(v||'').trim();return (!x||x==='Não informado'||x==='Não se aplica')?'-':x} function shortLabel(v){return String(v||'').replace('Compartilhado','Compartil.').replace('Restaurantes e Delivery','Rest. e Delivery')} function txs(m=state.month){return (state.transactions[m]||[]).map(t=>{const city=t.city||cityOf(t.sub||t.description||t.desc||'');return {...t,description:cleanName(t.description||t.desc||''),responsible:ownerOf(city),city,card:cardOf(t.card),sub:cleanName(t.sub||'')}})} function revObj(m){return state.revenues[m]||{cicero:0,nilce:0,reserva:0,outrasOrigem:''}} function otherRevenueSource(value){const r=typeof value==='string'?revObj(value):(value||{});return String(r.outrasOrigem||r.reservaOrigem||'').trim()} function revenueTotal(m){const r=revObj(m);return Number(r.cicero||0)+Number(r.nilce||0)+Number(r.reserva||0)} function expenseTotal(m){return txs(m).reduce((s,t)=>s+Number(t.amount||0),0)} function budgetBase(m,catId){return (state.budgets[m]||[]).filter(b=>!catId||b.cat===catId).reduce((s,b)=>s+Number(b.planned||0),0)} function reallocDelta(m,catId){return (state.reallocations[m]||[]).reduce((s,r)=>s+(r.to===catId?Number(r.amount||0):0)-(r.from===catId?Number(r.amount||0):0),0)} function budgetAdjusted(m,catId){return budgetBase(m,catId)+reallocDelta(m,catId)}
function budgetLineDelta(m,budgetId){return (state.reallocations[m]||[]).reduce((s,r)=>s+(r.toBudgetId===budgetId?Number(r.amount||0):0)-(r.fromBudgetId===budgetId?Number(r.amount||0):0),0)}
function budgetLineAdjusted(m,b){return Number(b&&b.planned||0)+budgetLineDelta(m,b&&b.id)}
function sameBudgetTarget(item,catId,sub,city){const itemCity=item.city||cityOf(item.sub||item.description||item.desc||'');return item.cat===catId&&norm(cleanName(item.sub||''))===norm(cleanName(sub||''))&&itemCity===city}
function txBudgetSnapshot(m,catId,sub,city,excludeId=null){const lines=(state.budgets[m]||[]).filter(b=>sameBudgetTarget(b,catId,sub,city));const planned=lines.reduce((s,b)=>s+budgetLineAdjusted(m,b),0);const used=(state.transactions[m]||[]).filter(t=>t.id!==excludeId&&sameBudgetTarget(t,catId,sub,city)).reduce((s,t)=>s+Number(t.amount||0),0);return{lines,planned,used,balance:planned-used}}
function budgetLineUsed(m,b,excludeId=null){const city=b.city||cityOf(b.sub||'');return (state.transactions[m]||[]).filter(t=>t.id!==excludeId&&sameBudgetTarget(t,b.cat,b.sub,city)).reduce((s,t)=>s+Number(t.amount||0),0)}
function balanceStatus(v){return v<-.005?'negativo':Math.abs(v)<=.005?'sem_saldo':'com_saldo'}

function setYear(y){const sameMonth=String(state.month||'').slice(5,7);const available=months().filter(m=>m.startsWith(String(y)+'-'));state.month=available.find(m=>m.slice(5,7)===sameMonth)||available[0]||state.month;save();render()}

function budgetMeta(b){const city=b.city||cityOf(b.sub||'');return {city,owner:ownerOf(city),name:cleanName(b.sub||cat(b.cat).name),cat:b.cat}} function budgetMatches(b,filters=expenseFilters){const meta=budgetMeta(b);return (filters.cat==='todos'||b.cat===filters.cat)&&(filters.owner==='todos'||meta.owner===filters.owner)&&(filters.city==='todos'||meta.city===filters.city)} function txMatches(t,filters=txRealizedFilters){return (filters.cat==='todos'||t.cat===filters.cat)&&(filters.owner==='todos'||t.responsible===filters.owner)&&(filters.city==='todos'||t.city===filters.city)} function monthNameFull(n){return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][n-1]} function monthShort(n){return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][n-1]} function periodMonths(){const m=state.month,list=months(),year=m.slice(0,4),mm=Number(m.slice(5,7));if(periodMode==='mes')return[m];if(periodMode==='tri'){const q=Math.floor((mm-1)/3);return list.filter(x=>x.startsWith(year)&&Number(x.slice(5,7))>=q*3+1&&Number(x.slice(5,7))<=q*3+3)}if(periodMode==='sem'){const start=mm<=6?1:7,end=mm<=6?6:12;return list.filter(x=>x.startsWith(year)&&Number(x.slice(5,7))>=start&&Number(x.slice(5,7))<=end)}if(periodMode==='ano')return list.filter(x=>x.startsWith(year));if(periodMode==='aa'){const prev=(Number(year)-1)+'-'+String(mm).padStart(2,'0');return[prev,m].filter(x=>list.includes(x))}return[m]} function periodLabel(){const p=metricMonths();if(view==='estrategia'&&periodMode==='aa')return 'Mesmo mês do ano anterior';if(p.length===1)return labelMonth(p[0]);return labelMonth(p[0])+' a '+labelMonth(p[p.length-1])} function metricMonths(){if(view==='receitas')return monthYearList(revenueScope);if(view==='despesas')return monthYearList(expenseScope);if(view==='rxd')return monthYearList(rxdScope);if(view==='estrategia')return periodMonths();return[state.month]} function scopeRevenue(){return metricMon function columnKeySlug(txt=''){
  return String(txt||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()
    .replace(/%/g,' percentual ').replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'coluna';
}
function normalizedColumnHeader(txt=''){

function tableTitleFromContext(wrap){

  if(wrap.classList.contains('rxd-detail-table'))return 'Detalhamento R x D';
  if(wrap.classList.contains('tx-forecast-table'))return 'Lançamentos — acompanhamento';
  if(wrap.classList.contains('tx-realized-grouped'))return 'Lançamentos realizados';
  if(wrap.classList.contains('tx-envelope-table'))return 'Envelopes semanais';
  if(wrap.classList.contains('envelope-week-table'))return 'Detalhamento semanal do envelope';
  if(wrap.classList.contains('tx-rem-table'))return 'Remanejamentos';

  const context=wrap.closest('.card,.strategy-card,.sheet');

}
function identifyTable(wrap,table,index=0){

function columnMinimumWidth(table,index,header=''){

  return isSelectionColumn||!String(header||'').trim()?28:50;

function currentColumnWidths(table){
  const headers=[...table.querySelectorAll('thead th')];
  return headers.map((th,i)=>{
    const bodyCell=table.querySelector(`tbody tr td:nth-child(${i+1})`);
    const measured=Math.max(th.getBoundingClientRect().width||0,bodyCell?.getBoundingClientRect().width||0,th.scrollWidth||0,bodyCell?.scrollWidth||0);
    return Math.max(columnMinimumWidth(table,i,th.textContent),Math.min(700,Math.round(measured||100)));
  });
}
function clearManualColumnWidths(table){
  if(!table)return;
  table.style.removeProperty('width');table.style.removeProperty('min-width');table.style.removeProperty('table-layout');
  [...table.rows].forEach(row=>[...row.cells].forEach(cell=>{cell.style.removeProperty('width');cell.style.removeProperty('min-width');cell.style.removeProperty('max-width')}));
  const wrap=table.closest('.table-wrap');if(wrap){wrap.removeAttribute('data-column-custom');wrap.style.removeProperty('--freeze-col-1')}
}
function applyColumnWidthsToTable(table,widths){
  if(!table||!Array.isArray(widths)||!widths.length)return;
  const headers=[...table.querySelectorAll('thead th')];
  const safe=widths.map((v,i)=>Math.max(columnMinimumWidth(table,i,headers[i]?.textContent||''),Math.min(700,Number(v)||100)));
  clearManualColumnWidths(table);
  [...table.rows].forEach(row=>[...row.cells].forEach((cell,i)=>{
    if(i>=safe.length||cell.colSpan>1)return;
    const px=safe[i]+'px';
    cell.style.setProperty('width',px,'important');
    cell.style.setProperty('min-width',px,'important');
    cell.style.setProperty('max-width',px,'important');
  }));
  const total=safe.reduce((a,b)=>a+b,0);
  table.style.setProperty('width',total+'px','important');
  table.style.setProperty('min-width',total+'px','important');
  table.style.setProperty('table-layout','fixed','important');
  const wrap=table.closest('.table-wrap');if(wrap){wrap.dataset.columnCustom='true';wrap.style.setProperty('--freeze-col-1',safe[0]+'px')}

function renderRxD(){

    return `<div class="bar-group"><div class="bar" style="height:${Math.max(2,r/max*100)}%"></div><div class="bar expense" style="height:${Math.max(2,e/max*100)}%"></div><div class="bar balance" style="height:${Math.max(2,Math.abs(b)/max*100)}%"></div><span>${labelMonth(m).slice(0,3)}</span></div>`
  }).join('');

  const year=state.month.slice(0,4);
  const cumulativeByMonth={};
  let accumulated=0;
  months().filter(m=>m.startsWith(year)).slice().sort().forEach(m=>{
    accumulated+=revenueTotal(m)-plannedExpenseTotal(m);
    cumulativeByMonth[m]=Math.abs(accumulated)<.005?0:accumulated;
  });

  const rows=p.map(m=>{
    const r=revenueTotal(m),e=plannedExpenseTotal(m);
    const bRaw=r-e;

  }).join('');

  layout(`<div class="head"><div><h2>R x D</h2><p>Comparativo: receita total x despesa total, com saldo mensal e saldo acumulado.</p></div></div><div class="card"><div class="section-title"><h3>Filtros</h3><span>Selecione o ano ou um mês específico</span></div>${simpleControls('rxd')}</div>${kpis()}<div class="grid cols2" style="margin-top:16px"><div class="card"><div class="section-title"><h3>Comparativo do período</h3><span>Receita, despesa e saldo</span></div><div class="barwrap">${bars}</div><div class="note">Azul = receita, vermelho = despesa, verde = saldo absoluto.</div></div><div class="card"><div class="section-title"><h3>Detalhamento R x D</h3><span>${rxdScope==='ano'?'Ano completo':labelMonth(state.month)}</span></div><div class="table-wrap rxd-detail-table"><table><thead><tr><th>Mês</th><th>Receita</th><th>Despesa</th><th>Saldo do mês</th><th>Saldo acumulado</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`)

rd)}"></div><div class="field"><label>Valor</label><input type="number" step="0.01" name="amount" value="${t.amount||0}"></div></div><div class="actions">${id?'<button class="btn danger" type="button" onclick="deleteTx()">Excluir</button>':''}<button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar</button></div></form>`)} function refreshSub(catId){const el=document.getElementById('subselect');if(!el)return;el.innerHTML=el.dataset.cleanLabels==='true'?txSubOptions(catId):subOptions(catId);sortSelectOptions(el.parentElement)} function saveTx(e){e.preventDefault();const f=new FormData(e.target),date=f.get('date')||state.month+'-01',m=date.slice(0,7),catId=f.get('cat'),sub=f.get('sub'),city=f.get('city'),amount=+f.get('amount')||0;if(amount<=0)return alert('Informe um valor maior que zero.');if(!state.transactions[m])state.transactions[m]=[];let existing=null,existingMonth=null,existingIndex=-1;for(const mm of months()){const i=(state.transactions[mm]||[]).findIndex(x=>x.id===editTxId);if(i>=0){existing=state.transactions[mm][i];existingMonth=mm;existingIndex=i;break}}const snap=txBudgetSnapshot(m,catId,sub,city);const sameTarget=existing&&existingMonth===m&&sameBudgetTarget(existing,catId,sub,city);const proposedUsed=snap.used-(sameTarget?Number(existing.amount||0):0)+amount;const proposedBalance=snap.planned-proposedUsed;const currentBalance=snap.balance;if(proposedBalance<-.005&&proposedBalance<currentBalance-.005){const available=Math.max(0,snap.planned-(snap.used-(sameTarget?Number(existing.amount||0):0)));return alert(`Este lançamento deixaria o saldo negativo.\n\nSaldo disponível: ${Number(available).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}\nValor informado: ${Number(amount).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}\n\nAumente a previsão ou faça um remanejamento antes de lançar.`)}const createdAt=(existing&&existing.createdAt)||new Date().toISOString();const obj={id:editTxId||('tx_'+Date.now()),date,desc:f.get('description'),description:f.get('description'),cat:catId,sub,payer:ownerOf(city),responsible:ownerOf(city),city,card:cardOf(f.get('card')),amount,createdAt,updatedAt:new Date().toISOString()};if(existing&&existingMonth===m){state.transactions[m][existingIndex]=obj}else{if(existing){state.transactions[existingMonth].splice(existingIndex,1)}state.transactions[m].push(obj)}state.month=m;txScope='mes';txPanel='realizados';txRealizedFilters={cat:'todos',owner:'todos',city:'todos'};save();closeModal();render()} function deleteTx(){if(!confirm('Excluir este lançamento?'))return;for(const m of months()){const arr=state.transactions[m]||[];const i=arr.findIndex(x=>x.id===editTxId);if(i>=0)arr.splice(i,1)}save();closeModal();render()}

function openCreateYear(origin='config'){const next=(Math.max(...years().map(y=>+y))+1)||new Date().getFullYear();modal(`<div class="sheet-head"><h3>Criar novo ano</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveNewYear(event,'${origin}')"><div class="form two"><div class="field"><label>Ano</label><input type="number" name="year" min="2020" max="2100" value="${next}"></div><div class="field"><label>Base para preencher</label><select name="copy"><option value="">Ano em branco</option>${years().map(y=>`<option value="${y}">Copiar estrutura de ${y}</option>`).join('')}</select></div></div><div class="note">O ano será criado com janeiro a dezembro. Depois você pode preencher receitas e despesas nas próprias visões.</div><div class="actions"><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Criar ano</button></div></form>`)} function saveNewYear(e,origin){e.preventDefault();const f=new FormData(e.target),y=String(f.get('year')).trim();if(!/^\d{4}$/.test(y))return alert('Informe um ano válido.');if(months().some(m=>m.startsWith(y)))return alert('Este ano já existe.');const copy=f.get('copy');for(let i=1;i<=12;i++){const id=y+'-'+String(i).padStart(2,'0');state.months.push({id,label:monthNameFull(i),short:monthShort(i)});state.revenues[id]={cicero:0,nilce:0,reserva:0,outrasOrigem:''};state.budgets[id]=[];state.transactions[id]=[];state.reallocations[id]=[];if(copy){const old=copy+'-'+String(i).padStart(2,'0');state.budgets[id]=(state.budgets[old]||[]).map(b=>({...b,id:'b_'+Date.now()+'_'+Math.random().toString(36).slice(2),planned:0}));}}
state.months.sort((a,b)=>a.id.localeCompare(b.id));state.month=y+'-01';save();closeModal();if(origin==='receitas')openFillRevenues();else if(origin==='despesas')openNewBudgetLine();else render()} 
function openFillRevenues(){const y=state.month.slice(0,4),list=months().filter(m=>m.startsWith(y));const rows=list.map(m=>{const r=revObj(m);return `<tr><td>${labelMonth(m)}</td><td><input type="number" step="0.01" name="${m}_c" value="${r.cicero||0}"></td><td><input type="number" step="0.01" name="${m}_n" value="${r.nilce||0}"></td><td><input type="number" step="0.01" name="${m}_r" value="${r.reserva||0}"></td></tr>`}).join('');modal(`<div class="sheet-head"><h3>Preencher receitas — ${y}</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveFillRevenues(event)"><div class="note">As origens de <b>Outras receitas</b> podem ser informadas clicando no cartão verde da tela de Receitas.</div><div class="table-wrap"><table><thead><tr><th>Mês</th><th>Cícero</th><th>Nilce</th><th>Outras receitas</th></tr></thead><tbody>${rows}</tbody></table></div><div class="actions"><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar receitas</button></div></form>`)} function saveFillRevenues(e){e.preventDefault();const f=new FormData(e.target),y=state.month.slice(0,4);months().filter(m=>m.startsWith(y)).forEach(m=>{const current=revObj(m);state.revenues[m]={...current,cicero:+f.get(m+'_c')||0,nilce:+f.get(m+'_n')||0,reserva:+f.get(m+'_r')||0}});save();closeModal();render()}
function ensureYearMonths(y){const ids=[];for(let i=1;i<=12;i++){const mm=String(i).padStart(2,'0'),id=y+'-'+mm;ids.push(id);if(!state.months.some(m=>m.id===id))state.months.push({id,label:monthNameFull(i),short:monthShort(i)});if(!state.revenues[id])state.revenues[id]={cicero:0,nilce:0,reserva:0,outrasOrigem:''};if(!state.budgets[id])state.budgets[id]=[];if(!state.transactions[id])state.transactions[id]=[];if(!state.reallocations[id])state.reallocations[id]=[]}state.months.sort((a,b)=>a.id.localeCompare(b.id));return ids}
function openNewBudgetLine(){const y=state.month.slice(0,4)||String(new Date().getFullYear());const inputs=Array.from({length:12},(_,idx)=>{const n=idx+1,mm=String(n).padStart(2,'0');return `<div class="field"><label>${monthNameFull(n)}</label><input type="number" step="0.01" min="0" name="month_${mm}" value="0"></div>`}).join('');modal(`<div class="sheet-head"><h3>Nova despesa prevista</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveNewBudgetLine(event)"><div class="form two"><div class="field"><label>Ano</label><input type="number" name="year" min="2020" max="2100" value="${y}" required></div><div class="field"><label>Categoria</label><select name="cat" onchange="refreshSub(this.value)">${catOptions()}</select></div><div class="field"><label>Subcategoria</label><input name="sub" placeholder="Ex.: Supermercado"></div><div class="field"><label>Cidade</label><select name="city"><option>Fortaleza</option><option>Brasília</option><option>Compartilhado</option></select></div></div><label class="envelope-toggle"><input type="checkbox" name="envelope"> Controlar esta despesa por envelope semanal</label><div class="section-title" style="margin-top:8px"><h3>Valores por mês</h3><span>Janeiro a dezembro · preencha somente os meses necessários</span></div><div class="form three">${inputs}</div><div class="note">Caso o ano ainda não exista, ele será criado automaticamente com os 12 meses.</div><div class="actions"><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar despesa prevista</button></div></form>`)} function saveNewBudgetLine(e){e.preventDefault();const f=new FormData(e.target),y=String(f.get('year')||'').trim();if(!/^\d{4}$/.test(y)||Number(y)<2020||Number(y)>2100)return alert('Informe um ano válido entre 2020 e 2100.');const catId=f.get('cat'),city=f.get('city'),subClean=cleanName(f.get('sub')||cat(catId).name),sub=subClean+' - '+city,yearMonths=ensureYearMonths function slugify(txt){return String(txt||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||('cat_'+Date.now())} function openCategory(id=''){const c=id?cat(id):{id:'',name:'',color:'#2563EB'};modal(`<div class="sheet-head"><h3>${id?'Editar':'Nova'} categoria</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveCategory(event,'${id}')"><div class="form two"><div class="field"><label>Nome</label><input name="name" value="${(c.name||'').replaceAll('"','&quot;')}" required></div><div class="field"><label>Cor</label><input type="color" name="color" value="${c.color||'#2563EB'}"></div></div><div class="actions">${id?'<button class="btn danger" type="button" onclick="deleteCategory(\''+id+'\')">Excluir</button>':''}<button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar</button></div></form>`)} function saveCategory(e,id){e.preventDefault();const f=new FormData(e.target),name=String(f.get('name')||'').trim(),color=f.get('color')||'#2563EB';if(!name)return; if(id){const c=state.categories.find(x=>x.id===id);if(c){c.name=name;c.color=color}}else{let newId=slugify(name),i=2;while(state.categories.some(c=>c.id===newId))newId=slugify(name)+'_'+i++;state.categories.push({id:newId,name,icon:name,color});state.subs[newId]=[]}save();closeModal();render()} function deleteCategory(id){if(!confirm('Excluir categoria? Os lançamentos antigos podem ficar sem classificação.'))return;state.categories=state.categories.filter(c=>c.id!==id);delete state.subs[id];save();closeModal();render()}
function openSubcategory(catId,enc=''){const old=enc?decodeURIComponent(enc):'';modal(`<div class="sheet-head"><h3>${old?'Editar':'Nova'} subcategoria</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveSubcategory(event,'${catId}','${encodeURIComponent(old)}')"><div class="form two"><div class="field"><label>Categoria</label><select name="cat">${catOptions(catId)}</select></div><div class="field"><label>Subcategoria</label><input name="sub" value="${old.replaceAll('"','&quot;')}" required></div></div><label class="envelope-toggle"><input type="checkbox" name="envelope" ${old&&isEnvelopeEnabled(catId,old)?'checked':''}> Controle por envelope semanal</label><div class="note">Quando ativo, os lançamentos desta subcategoria são distribuídos automaticamente por semanas de domingo a sábado.</div><div class="actions">${old?'<button class="btn danger" type="button" onclick="deleteSubcategory(\''+catId+'\',\''+encodeURIComponent(old)+'\')">Excluir</button>':''}<button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar</button></div></form>`)} function saveSubcategory(e,catId,encOld){e.preventDefault();const f=new FormData(e.target),newCat=f.get('cat'),sub=String(f.get('sub')||'').trim(),old=decodeURIComponent(encOld||''),enabled=f.get('envelope')==='on';if(!sub)return;if(!state.subs[newCat])state.subs[newCat]=[];if(old&&state.subs[catId])state.subs[catId]=state.subs[catId].filter(x=>x!==old);if(old)deleteEnvelopeSetting(catId,old);if(!state.subs[newCat].includes(sub))state.subs[newCat].push(sub);setEnvelopeEnabled(newCat,sub,enabled);save();closeModal();render()} function deleteSubcategory(catId,enc){const old=decodeURIComponent(enc);if(!confirm('Excluir subcategoria?'))return;state.subs[catId]=(state.subs[catId]||[]).filter(x=>x!==old);deleteEnvelopeSetting(catId,old);save();closeModal();render()}
function downloadJSONFile(content,filename){const blob=new Blob([JSON.stringify(content,null,2)],{type:'application/json'});const a=document.createElement('a');const url=URL.createObjectURL(blob);a.href=url;a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(url),1200)}

function decorateManagedTables(root=document){

    const labels=headers.map((th,index)=>def.labels?.[index]||th.textContent.trim()||`Coluna ${index+1}`),keys=labels.map((label,index)=>tableColumnSlug(label,index));
    headers.forEach((th,index)=>{th.dataset.col=keys[index];th.dataset.colLabel=labels[index];if(def.freeze===index)th.dataset.freeze='true'});
    table.querySelectorAll('tbody tr').forEach(row=>[...row.children].forEach((cell,index)=>{if(keys[index]){cell.dataset.col=keys[index];if(def.freeze===index)cell.dataset.freeze='true'}}));
    const pref=tablePreferences(def.key,def),hidden=new Set(pref.hidden.map(String));
    headers.forEach((th,index)=>{const hide=hidden.has(String(index))&&!def.locked?.includes(index);th.dataset.colHidden=hide?'true':'false';th.style.setProperty('display',hide?'none':'table-cell','important');table.querySelectorAll(`tbody tr > *:nth-child(${index+1})`).forEach(cell=>{cell.dataset.colHidden=hide?'true':'false';cell.style.setProperty('display',hide?'none':'table-cell','important')})});

    const visible=headers.filter((_,i)=>!hidden.has(String(i))||def.locked?.includes(i)).length;

  }))
}

let activeManagedRowContext=null;
function managedRowMetadata(row){
  if(row?.dataset?.managedKind)return {kind:row.dataset.managedKind,id:row.dataset.managedId||'',name:row.dataset.managedName||'Item',row};
  const table=row.closest('.managed-table'),key=table?.dataset.tableKey||'',itemCell=row.querySelector('[data-freeze="true"]'),name=itemCell?.querySelector('strong')?.textContent.trim()||itemCell?.textContent.trim()||'Item';
  if(key==='lancamentos_realizados'){const id=row.querySelector('[data-tx-id]')?.dataset.txId;return {kind:'realized',id,name,row}}
  if(key==='lancamentos_acompanhamento')return {kind:'forecast',id:row.dataset.forecastKey,name,row};
  if(key==='despesas_expandidas'){const click=itemCell?.querySelector('.expense-line-button')?.getAttribute('onclick')||'',match=click.match(/openAnnualBudgetEditor\('([^']+)'\)/);return {kind:'expense',id:match?.[1]||'',name,row}}

}
function enhanceExpandableRows(root=document){

    row.dataset.expandReady='1';row.dataset.managedKind=meta.kind;row.dataset.managedId=meta.id||'';row.dataset.managedName=meta.name||'Item';row.classList.add('managed-row-clickable');row.tabIndex=0;

      const button=cell?.querySelector('.expense-line-button');
      if(button){button.removeAttribute('onclick');button.title='Abrir detalhes da despesa';button.addEventListener('click',event=>{event.preventDefault();event.stopPropagation();openManagedRowPreview(row)})}
    }else row.removeAttribute('onclick');

    row.addEventListener('keydown',event=>{if((event.key==='Enter'||event.key===' ')&&!event.target.closest('input,button,a,select,textarea')){event.preventDefault();openManagedRowPreview(row)}});

function rowDetailFields(row){const table=row.closest('table'),headers=[...table.querySelectorAll('thead th')];return [...row.children].map((cell,index)=>({label:headers[index]?.dataset.colLabel||headers[index]?.textContent.trim()||'',value:cell.innerText.trim()})).filter(x=>x.label&&!/^seleção$/i.test(x.label)&&x.value)}

// v80 — redimensionamento de colunas por arraste e respeito à orientação do aparelho.
let activeColumnDrag=null;
function installColumnDragResizers(root=document){
  if(!root)return;
  root.querySelectorAll('table[data-column-key]').forEach(table=>{
    const headers=[...table.querySelectorAll('thead tr:first-child > th')];
    headers.forEach((th,index)=>{
      th.classList.add('column-resizable');
      let handle=th.querySelector(':scope > .column-resize-handle');
      if(!handle){
        handle=document.createElement('span');
        handle.className='column-resize-handle';
        handle.setAttribute('role','separator');
        handle.setAttribute('aria-orientation','vertical');
        handle.title='Arraste para ajustar a largura desta coluna';
        th.appendChild(handle);
      }
      if(handle.dataset.bound==='1')return;
      handle.dataset.bound='1';
      handle.addEventListener('pointerdown',event=>startColumnDrag(event,table,index,handle));
    });
  });
}
function startColumnDrag(event,table,index,handle){
  if(event.button!==undefined&&event.button!==0)return;
  event.preventDefault();event.stopPropagation();
  ensureUiState();
  const headers=[...table.querySelectorAll('thead tr:first-child > th')],key=table.dataset.columnKey;
  if(!key||!headers[index])return;
  const saved=columnWidthProfile()[key]?.widths;
  const widths=Array.isArray(saved)&&saved.length===headers.length?saved.slice():currentColumnWidths(table);
  const min=columnMinimumWidth(table,index,headers[index].textContent||''),startWidth=Math.max(min,Number(widths[index])||headers[index].getBoundingClientRect().width||100);
  activeColumnDrag={table,index,key,headers,widths,startX:event.clientX,startWidth,min,handle,wrap:table.closest('.table-wrap')};
  handle.classList.add('is-active');activeColumnDrag.wrap?.classList.add('is-column-resizing');document.documentElement.classList.add('is-column-resizing');
  try{handle.setPointerCapture(event.pointerId)}catch{}
  window.addEventListener('pointermove',moveColumnDrag,{passive:false});
  window.addEventListener('pointerup',finishColumnDrag,{once:true});
  window.addEventListener('pointercancel',finishColumnDrag,{once:true});
}
function moveColumnDrag(event){
  const drag=activeColumnDrag;if(!drag)return;
  event.preventDefault();
  drag.widths[drag.index]=Math.max(drag.min,Math.min(700,Math.round(drag.startWidth+(event.clientX-drag.startX))));
  applyColumnWidthsToTable(drag.table,drag.widths);
}
function finishColumnDrag(){
  const drag=activeColumnDrag;if(!drag)return;
  window.removeEventListener('pointermove',moveColumnDrag);
  drag.handle?.classList.remove('is-active');drag.wrap?.classList.remove('is-column-resizing');document.documentElement.classList.remove('is-column-resizing');
  columnWidthProfile()[drag.key]={title:drag.table.dataset.columnTitle||'Tabela',headers:drag.headers.map(th=>(th.textContent||'').trim()),widths:drag.widths.slice(),updatedAt:new Date().toISOString(),method:'drag'};
  save();activeColumnDrag=null;
}
function respectDeviceOrientation(){
  try{const result=window.screen?.orientation?.unlock?.();if(result&&typeof result.catch==='function')result.catch(()=>{})}catch{}
}
window.addEventListener('pageshow',respectDeviceOrientation);
window.addEventListener('focus',respectDeviceOrientation);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)respectDeviceOrientation()});
respectDeviceOrientation();


// v81 — remove uma única vez larguras antigas de Receitas que impediam o ajuste automático.
function migrateRevenueAutoSizingV81(){
  const prefs=devicePreferences();
  if(prefs.revenueAutoSizingV81)return;
  const profile=columnWidthProfile();
  let changed=false;
  Object.keys(profile).forEach(key=>{
    if(/^receitas_resumo_do_periodo_/i.test(key)){
      delete profile[key];
      changed=true;
    }
  });
  prefs.revenueAutoSizingV81=true;
  if(changed&&cloudSynced){cacheCloudState();scheduleCloudSave()}
}
const layoutV80BeforeRevenueAutoSizing=layout;
layout=function(content){
  migrateRevenueAutoSizingV81();
  layoutV80BeforeRevenueAutoSizing(content);
};
