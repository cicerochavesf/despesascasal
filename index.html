function budgetLineDelta(m,budgetId){return (state.reallocations[m]||[]).reduce((s,r)=>s+(r.toBudgetId===budgetId?Number(r.amount||0):0)-(r.fromBudgetId===budgetId?Number(r.amount||0):0),0)}
function budgetLineAdjusted(m,b){return Number(b&&b.planned||0)+budgetLineDelta(m,b&&b.id)}
function sameBudgetTarget(item,catId,sub,city){const itemCity=item.city||cityOf(item.sub||item.description||item.desc||'');return item.cat===catId&&norm(cleanName(item.sub||''))===norm(cleanName(sub||''))&&itemCity===city}
function txBudgetSnapshot(m,catId,sub,city,excludeId=null){const lines=(state.budgets[m]||[]).filter(b=>sameBudgetTarget(b,catId,sub,city));const planned=lines.reduce((s,b)=>s+budgetLineAdjusted(m,b),0);const used=(state.transactions[m]||[]).filter(t=>t.id!==excludeId&&sameBudgetTarget(t,catId,sub,city)).reduce((s,t)=>s+Number(t.amount||0),0);return{lines,planned,used,balance:planned-used}}
function budgetLineUsed(m,b,excludeId=null){const city=b.city||cityOf(b.sub||'');return (state.transactions[m]||[]).filter(t=>t.id!==excludeId&&sameBudgetTarget(t,b.cat,b.sub,city)).reduce((s,t)=>s+Number(t.amount||0),0)}
function balanceStatus(v){return v<-.005?'negativo':Math.abs(v)<=.005?'sem_saldo':'com_saldo'}
function years(){return [...new Set(months().map(m=>m.slice(0,4)))].sort()} function monthYearList(scope){const year=state.month.slice(0,4);return scope==='mes'?[state.month]:months().filter(x=>x.startsWith(year))} function yearSelectHTML(){return `<select class="select" onchange="setMonth(this.value+'-'+state.month.slice(5,7))">${years().map(y=>`<option value="${y}" ${state.month.startsWith(y)?'selected':''}>${y}</option>`).join('')}</select>`} function monthSelectHTML(){return `<select class="select" onchange="setMonth(this.value)">${months().filter(m=>m.startsWith(state.month.slice(0,4))).map(m=>`<option value="${m}" ${m===state.month?'selected':''}>${labelMonth(m)}</option>`).join('')}</select>`} function simpleControls(kind){const scope=kind==='receita'?revenueScope:kind==='despesa'?expenseScope:rxdScope,scopeVar=kind==='receita'?'revenueScope':kind==='despesa'?'expenseScope':'rxdScope';return `<div class="filterbar"><button class="${scope==='ano'?'active':''}" onclick="${scopeVar}='ano';render()">Ano todo</button><button class="${scope==='mes'?'active':''}" onclick="${scopeVar}='mes';render()">Mês selecionado</button>${yearSelectHTML()}${monthSelectHTML()}</div>`} function ownerOptions(sel){return ['todos','Compartilhado','Cícero','Nilce'].map(v=>`<option value="${v}" ${sel===v?'selected':''}>${v==='todos'?'Todos responsáveis':v}</option>`).join('')} function cityOptions(sel){return ['todos','Brasília','Compartilhado','Fortaleza'].map(v=>`<option value="${v}" ${sel===v?'selected':''}>${v==='todos'?'Todas cidades':v}</option>`).join('')} function categoryFilterOptions(sel){return `<option value="todos" ${sel==='todos'?'selected':''}>Todas categorias</option>`+state.categories.slice().sort((a,b)=>textCmp(a.name,b.name)).map(c=>`<option value="${c.id}" ${sel===c.id?'selected':''}>${c.name}</option>`).join('')} function expenseFilterControls(){return `<div class="filterbar">${simpleControls('despesa')}<select class="select" onchange="expenseFilters.cat=this.value; function budgetMeta(b){const city=b.city||cityOf(b.sub||'');return {city,owner:ownerOf(city),name:cleanName(b.sub||cat(b.cat).name),cat:b.cat}} function budgetMatches(b,filters=expenseFilters){const meta=budgetMeta(b);return (filters.cat==='todos'||b.cat===filters.cat)&&(filters.owner==='todos'||meta.owner===filters.owner)&&(filters.city==='todos'||meta.city===filters.city)} function txMatches(t,filters=txRealizedFilters){return (filters.cat==='todos'||t.cat===filters.cat)&&(filters.owner==='todos'||t.responsible===filters.owner)&&(filters.city==='todos'||t.city===filters.city)} function monthNameFull(n){return ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][n-1]} function monthShort(n){return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][n-1]} function periodMonths(){const m=state.month,list=months(),year=m.slice(0,4),mm=Number(m.slice(5,7));if(periodMode==='mes')return[m];if(periodMode==='tri'){const q=Math.floor((mm-1)/3);return list.filter(x=>x.startsWith(year)&&Number(x.slice(5,7))>=q*3+1&&Number(x.slice(5,7))<=q*3+3)}if(periodMode==='sem'){const start=mm<=6?1:7,end=mm<=6?6:12;return list.filter(x=>x.startsWith(year)&&Number(x.slice(5,7))>=start&&Number(x.slice(5,7))<=end)}if(periodMode==='ano')return list.filter(x=>x.startsWith(year));if(periodMode==='aa'){const prev=(Number(year)-1)+'-'+String(mm).padStart(2,'0');return[prev,m].filter(x=>list.includes(x))}return[m]} function periodLabel(){const p=metricMonths();if(view==='estrategia'&&periodMode==='aa')return 'Mesmo mês do ano anterior';if(p.length===1)return labelMonth(p[0]);return labelMonth(p[0])+' a '+labelMonth(p[p.length-1])} function metricMonths(){if(view==='receitas')return monthYearList(revenueScope);if(view==='despesas')return monthYearList(expenseScope);if(view==='rxd')return monthYearList(rxdScope);if(view==='estrategia')return periodMonths();return[state.month]} function scopeRevenue(){return metricMonths().reduce((s,m)=>s+revenueTotal(m),0)} function plannedExpenseTotal(m){return state.categories.reduce((s,c)=>s+budgetAdjusted(m,c.id),0)} function scopeExpense(){return metricMonths().reduce((s,m)=>s+plannedExpenseTotal(m),0)} function scopeRealized(){return metricMonths().reduce((s,m)=>s+expenseTotal(m),0)} function scopeBudget(){return metricMonths().reduce((s,m)=>s+state.categories.reduce((a,c)=>a+budgetAdjusted(m,c.id),0),0)}
const viewLabels={receitas:'Receitas',despesas:'Despesas',rxd:'R x D',lancamentos:'Lançamentos',estrategia:'Visão Gerencial',config:'Configurações'}; function nav(){return Object.keys(viewLabels).map(v=>`<button class="${view===v?'active':''}" onclick="setView('${v}')">${viewLabels[v]}</button>`).join('')} function compareControls(){return `<div class="compare">${[['mes','Mês'],['tri','Trimestre'],['sem','Semestre'],['ano','Ano'],['aa','Mesmo mês A.A.']].map(([id,lb])=>`<button class="${periodMode===id?'active':''}" onclick="periodMode='${id}';render()">${lb}</button>`).join('')}</div>`} function layout(content){document.getElementById('app').innerHTML=`<div class="shell"><header class="header"><div class="header-in"><div class="brand"><div class="mark">CN</div><div><h1>Despesas Casal - Controle Financeiro</h1></div></div><nav class="nav">${nav()}</nav><div class="right"><span id="cloudStatus" class="cloud-status">${lastCloudStatus}</span></div></div></header><main class="main">${content}</main></div>`}
function kpis(){const rec=scopeRevenue(), exp=scopeExpense(), bal=rec-exp;return `<div class="grid cols3"><div class="card metric"><div class="label">Receita</div><div class="value">${fmt(rec)}</div><div class="subtxt">${periodLabel()}</div></div><div class="card metric"><div class="label">Despesas</div><div class="value neg">${fmt(exp)}</div><div class="subtxt">${pct(exp,rec)} da receita</div></div><div class="card metric"><div class="label">Saldo</div><div class="value ${bal>=0?'pos':'neg'}">${fmt(bal)}</div><div class="subtxt">${pct(bal,rec)} da receita</div></div></div>`}
function revenueKpis(){const list=monthYearList(revenueScope);const totals=list.reduce((a,m)=>{const r=revObj(m);a.cicero+=(+r.cicero||0);a.nilce+=(+r.nilce||0);a.reserva+=(+r.reserva||0);return a},{cicero:0,nilce:0,reserva:0});const total=totals.cicero+totals.nilce+totals.reserva;return `<div class="grid cols3"><div class="card metric cicero"><div class="label">Cícero</div><div class="value">${fmt(totals.cicero)}</div><div class="subtxt">${pct(totals.cicero,total)} do total</div></div><div class="card metric nilce"><div class="label">Nilce</div><div class="value">${fmt(totals.nilce)}</div><div class="subtxt">${pct(totals.nilce,total)} do total</div></div><div class="card metric reserva"><div class="label">Resgate reserva</div><div class="value">${fmt(totals.reserva)}</div><div class="subtxt">${pct(totals.reserva,total)} do total</div></div></div>`}
function renderReceitas(){const list=monthYearList(revenueScope);const rows=list.map(m=>{const r=revObj(m), total=revenueTotal(m);return `<tr class="clickable" onclick="openRevenue('${m}')"><td>${labelMonth(m)}</td><td class="rev-cicero">${fmt(r.cicero)}</td><td class="rev-cicero">${pct(r.cicero,total)}</td><td class="rev-nilce">${fmt(r.nilce)}</td><td class="rev-nilce">${pct(r.nilce,total)}</td><td class="rev-reserva">${fmt(r.reserva)}</td><td class="rev-reserva">${pct(r.reserva,total)}</td><td><b>${fmt(total)}</b></td><td>100,0%</td></tr>`}).join('');layout(`<div class="head"><div><h2>Receitas</h2><p>Resumo do valor total de cada mês, com participação percentual e edição direta.</p></div><div class="actions"><button class="btn secondary" onclick="openFillRevenues()">Preencher receitas</button></div></div><div class="card"><div class="section-title"><h3>Filtros</h3><span>Ano ou mês selecionado</span></div>${simpleControls('receita')}</div><div style="margin-top:16px">${revenueKpis()}</div><div class="card" style="margin-top:16px"><div class="section-title"><h3>Resumo do Período de Receitas</h3><span>Azul = Cícero · rosa = Nilce · verde = Resgate Reserva</span></div><div class="table-wrap"><table><thead><tr><th>Mês</th><th>Cícero</th><th>%</th><th>Nilce</th><th>%</th><th>Resgate Reserva</th><th>%</th><th>Total</th><th>%</th></tr></thead><tbody>${rows}</tbody></table></div></div>`)}
function expenseRowsByCat(m){return state.categories.map(c=>{const adjusted=budgetAdjusted(m,c.id), d=reallocDelta(m,c.id);return {...c,adjusted,d}}).filter(x=>x.adjusted||x.d)} function plannedFilteredByCat(m,catId){const hasExtraFilter=expenseFilters.owner!=='todos'||expenseFilters.city!=='todos'; if(!hasExtraFilter){return budgetAdjusted(m,catId)} return (state.budgets[m]||[]).filter(b=>b.cat===catId&&budgetMatches(b,expenseFilters)).reduce((s,b)=>s+budgetLineAdjusted(m,b),0)} function renderDespesas(){const list=monthYearList(expenseScope);const monthHeaders=list.map(m=>`<th class="month-head">${labelMonth(m)}</th>`).join('');const cats=state.categories.filter(c=>expenseFilters.cat==='todos'||c.id===expenseFilters.cat).map(c=>{const vals=list.map(m=>plannedFilteredByCat(m,c.id));const total=vals.reduce((s,v)=>s+v,0);return{c,vals,total}}).filter(x=>x.total>0).sort((a,b)=>textCmp(a.c.name,b.c.name)||(b.total-a.total));const periodTotal=cats.reduce((acc,x)=>acc+x.total,0);const rows=cats.map(({c,vals,total})=>`<tr class="cat-total-row category-tinted" style="--cat-color:${c.color};--cat-soft:${c.color}12"><td><span class="cat-tag" style="background:${c.color}18;color:${c.color}"><span class="row-accent" style="background:${c.color}"></span>${c.name}</span></td>${vals.map(v=>`<td class="soft-cell despesa-cell" style="--cat-color:${c.color}">${fmt(v)}</td>`).join('')}<td class="total-col total-highlight" style="color:${c.color}">${fmt(total)}</td><td>${pct(total,periodTotal)}</td></tr>`).join('');const detail=renderExpenseDetail(list);layout(`<div class="head"><div><h2>Despesas</h2><p>Resumo consolidado lado a lado por mês. A edição acontece somente na visão expandida abaixo.</p></div><div class="actions"><button class="btn secondary" onclick="openNewBudgetLine()">Nova despesa prevista</button></div></div>${kpis()}<div class="card" style="margin-top:16px"><div class="section-title"><h3>Filtros</h3><span>A visão abre no ano todo, mas você pode selecionar mês, categoria, responsável ou cidade</span></div>${expenseFilterControls()}</div><div class="card" style="margin-top:16px"><div class="section-title"><h3>Resumo consolidado de despesas</h3><span>${expenseScope==='ano'?'Ano todo':'Mês selecionado'} · total destacado e leitura mensal mais clara</span></div><div class="table-wrap wide freeze-cat sticky-months summary-colorized"><table><thead><tr><th>Categoria</th>${monthHeaders}<th>Total</th><th>% do período</th></tr></thead><tbody>${rows||'<tr><td colspan="9">Sem dados</td></tr>'}</tbody></table></div></div><div class="card" style="margin-top:16px"><div class="section-title"><h3>Visão expandida das despesas</h3><span>Todas as categorias permanecem visíveis · cabeçalho dos meses fixo · clique no valor do mês para editar</span></div>${detail}</div>`)}
function renderExpenseDetail(list){
  const monthHeaders=list.map(m=>`<th class="month-head">${labelMonth(m)}</th>`).join('');
  const grouped={};
  list.forEach(m=>(state.budgets[m]||[]).forEach(b=>{
    if(!budgetMatches(b,expenseFilters))return;
    const city=b.city||cityOf(b.sub||'');
    const owner=ownerOf(city);
    const name=cleanName(b.sub||cat(b.cat).name);
    const key=[b.cat,name,city].join('|');
    if(!grouped[key])grouped[key]={catId:b.cat,name,sub:name,city,owner,vals:{},ids:{},total:0};
    const adjustedLine=budgetLineAdjusted(m,b);
    grouped[key].vals[m]=(grouped[key].vals[m]||0)+adjustedLine;
    grouped[key].ids[m]=grouped[key].ids[m]||b.id;
    grouped[key].total+=adjustedLine;
  }));
  const items=Object.values(grouped).filter(x=>x.total>0).sort(compareExpenseItems);
  if(!items.length)return '<div class="empty">Sem despesas na seleção atual.</div>';
  return `<div class="table-wrap expanded compact freeze-detail sticky-months expense-enhanced"><table><thead><tr><th>Descrição</th><th>Categoria</th><th>Subcategoria</th><th>Responsável</th><th>Cidade</th>${monthHeaders}<th class="total-head">Total</th></tr></thead><tbody>${items.map(b=>{
    const cells=list.map(m=>{const v=b.vals[m]||0,id=b.ids[m];return v?`<td class="soft-cell clickable despesa-cell month-value" style="--cat-color:${cat(b.catId).color}" onclick="openBudgetItem('${id}','${m}')">${fmt(v)}</td>`:`<td class="soft-cell muted-cell despesa-cell month-value" style="--cat-color:${cat(b.catId).color}">-</td>`}).join('');
    const ownerClass=b.owner==='Cícero'?'cicero':b.owner==='Nilce'?'nilce':'compartilhado';return `<tr class="category-tinted" style="--cat-color:${cat(b.catId).color};--cat-soft:${cat(b.catId).color}12"><td>${b.name}</td><td><span class="cat-tag" style="background:${cat(b.catId).color}18;color:${cat(b.catId).color}"><span class="row-accent" style="background:${cat(b.catId).color}"></span>${cat(b.catId).name}</span></td><td>${b.sub}</td><td><span class="owner-pill compact-label ${ownerClass}">${shortLabel(b.owner)}</span></td><td class="compact-label">${shortLabel(b.city)}</td>${cells}<td class="total-col total-highlight" style="color:${cat(b.catId).color}">${fmt(b.total)}</td></tr>`
  }).join('')}</tbody></table></div>`
}
function renderRxD(){const p=monthYearList(rxdScope);const max=Math.max(...p.map(m=>Math.max(revenueTotal(m),plannedExpenseTotal(m),Math.abs(revenueTotal(m)-plannedExpenseTotal(m)))),1);const bars=p.map(m=>{const r=revenueTotal(m),e=plannedExpenseTotal(m),b=r-e;return `<div class="bar-group"><div class="bar" style="height:${Math.max(2,r/max*100)}%"></div><div class="bar expense" style="height:${Math.max(2,e/max*100)}%"></div><div class="bar balance" style="height:${Math.max(2,Math.abs(b)/max*100)}%"></div><span>${labelMonth(m).slice(0,3)}</span></div>`}).join('');const rows=p.map(m=>{const r=revenueTotal(m),e=plannedExpenseTotal(m),b=r-e;return `<tr><td class="month-name">${labelMonth(m)}</td><td>${fmt(r)}</td><td>${fmt(e)}</td><td class="${b>=0?'pos':'neg'}">${fmt(b)}</td><td>${pct(e,r)}</td></tr>`}).join('');layout(`<div class="head"><div><h2>R x D</h2><p>Comparativo: receita total x despesa total x saldo. Fórmula viva puxando Receitas e Despesas.</p></div></div><div class="card"><div class="section-title"><h3>Filtros</h3><span>Ano ou mês selecionado</span></div>${simpleControls('rxd')}</div>${kpis()}<div class="grid cols2" style="margin-top:16px"><div class="card"><div class="section-title"><h3>Comparativo do período</h3><span>Receita, despesa e saldo</span></div><div class="barwrap">${bars}</div><div class="note">Azul = receita, vermelho = despesa, verde = saldo absoluto.</div></div><div class="card"><div class="section-title"><h3>Detalhamento R x D</h3><span>${rxdScope==='ano'?'Ano todo':labelMonth(state.month)}</span></div><div class="table-wrap rxd-detail-table"><table><thead><tr><th>Mês</th><th>Receita</th><th>Despesa</th><th>Saldo</th><th>Despesa/Receita</th></tr></thead><tbody>${rows}</tbody></table></div></div></div>`)}
function renderLancamentos(){
  const selectedMonths=monthYearList(txScope);
  const periodTitle=txScope==='ano'?('Ano '+state.month.slice(0,4)):labelMonth(state.month);
  const allTx=[];
  selectedMonths.forEach(m=>txs(m).forEach(t=>allTx.push({...t,month:m})));
  const txList=allTx.filter(t=>txMatches(t,txRealizedFilters));
  const usedByKey={};
  allTx.forEach(t=>{const key=[t.month,t.cat,norm(cleanName(t.sub||t.description||'')),t.city].join('|');usedByKey[key]=(usedByKey[key]||0)+Number(t.amount||0)});
  const budgetMap={};
  selectedMonths.forEach(m=>(state.budgets[m]||[]).filter(b=>budgetLineAdjusted(m,b)>0).filter(b=>budgetMatches(b,txForecastFilters)).forEach(b=>{
    const city=b.city||cityOf(b.sub||'');const name=cleanName(b.sub||cat(b.cat).name);const key=[b.cat,norm(name),city].join('|');
    const used=usedByKey[[m,b.cat,norm(name),city].join('|')]||0;
    if(!budgetMap[key])budgetMap[key]={...b,city,owner:ownerOf(city),name,planned:0,used:0,balance:0,firstMonth:m};
    budgetMap[key].planned+=budgetLineAdjusted(m,b);budgetMap[key].used+=used;budgetMap[key].balance=budgetMap[key].planned-budgetMap[key].used;
  }));
  const allBudgets=Object.values(budgetMap).sort(compareExpenseItems);
  const budgets=allBudgets.filter(b=>txForecastFilters.balance==='todos'||balanceStatus(b.balance)===txForecastFilters.balance);
  const plannedTotal=allBudgets.reduce((s,b)=>s+Number(b.planned||0),0);
  const usedTotal=allBudgets.reduce((s,b)=>s+b.used,0);
  const openTotal=plannedTotal-usedTotal;
  const withBalance=allBudgets.filter(b=>b.balance>.005).length;
  const noBalance=allBudgets.filter(b=>Math.abs(b.balance)<=.005).length;
  const negativeCount=allBudgets.filter(b=>b.balance<-.005).length;
  const forecastRows=budgets.map(b=>{const status=balanceStatus(b.balance),statusLabel=status==='com_saldo'?'Com saldo':status==='sem_saldo'?'Sem saldo':'Negativo';return `<tr class="clickable category-tinted tx-clean-row" style="--cat-color:${cat(b.cat).color};--cat-soft:${cat(b.cat).color}10" onclick="${txScope==='mes'?`openBudgetItem('${b.id}','${state.month}')`:`alert('Para editar, filtre por mês selecionado.')`}"><td><div class="tx-row-main"><strong><span class="row-accent" style="background:${cat(b.cat).color}"></span>${b.name}</strong><small><span class="category-text" style="color:${cat(b.cat).color}">${cat(b.cat).name}</span> · ${shortLabel(b.owner)} / ${shortLabel(b.city)}</small></div></td><td>${fmt(b.planned)}</td><td>${fmt(b.used)}</td><td><div class="tx-balance-cell"><span class="tx-status ${status}">${statusLabel}</span><b class="${b.balance<0?'neg':b.balance===0?'muted':'pos'}">${fmt(b.balance)}</b></div></td></tr>`}).join('');
  const rows=txList.map(t=>`<tr class="clickable category-tinted tx-clean-row" style="--cat-color:${cat(t.cat).color};--cat-soft:${cat(t.cat).color}10" onclick="openTx('${t.id}')"><td>${fmtDate(t.date)}</td><td><div class="tx-row-main"><strong>${cleanName(t.description)}</strong><small>${cleanName(t.sub||'')}</small></div></td><td><span class="cat-tag" style="background:${cat(t.cat).color}18;color:${cat(t.cat).color}"><span class="row-accent" style="background:${cat(t.cat).color}"></span>${cat(t.cat).name}</span></td><td><div class="tx-person"><span class="owner-pill compact-label">${shortLabel(t.responsible)}</span><small>${shortLabel(t.city)}</small></div></td><td>${cardOf(t.card)}</td><td class="tx-amount">${fmt(t.amount)}</td></tr>`).join('');
  const remMonths=txScope==='ano'?selectedMonths:[state.month];
  const remEntries=remMonths.flatMap(m=>(state.reallocations[m]||[]).map(r=>({m,r})));
  const rem=remEntries.map(({m,r})=>{const fromB=(state.budgets[m]||[]).find(b=>b.id===r.fromBudgetId),toB=(state.budgets[m]||[]).find(b=>b.id===r.toBudgetId);const fromLabel=fromB?`${cleanName(fromB.sub)} · ${shortLabel(fromB.city||cityOf(fromB.sub))}`:cat(r.from).name;const toLabel=toB?`${cleanName(toB.sub)} · ${shortLabel(toB.city||cityOf(toB.sub))}`:cat(r.to).name;return `<tr><td>${txScope==='ano'?labelMonth(m):''}</td><td>${fromLabel}</td><td>${toLabel}</td><td>${fmt(r.amount)}</td><td>${r.note||''}</td><td><button class="tiny danger" onclick="event.stopPropagation();deleteRealloc('${r.id}','${m}')">Excluir</button></td></tr>`}).join('');
  const tabs=`<div class="tx-tabs"><button class="${txPanel==='acompanhamento'?'active':''}" onclick="txPanel='acompanhamento';render()"><span>Acompanhamento</span><b>${budgets.length}</b></button><button class="${txPanel==='realizados'?'active':''}" onclick="txPanel='realizados';render()"><span>Realizados</span><b>${txList.length}</b></button><button class="${txPanel==='remanejamentos'?'active':''}" onclick="txPanel='remanejamentos';render()"><span>Remanejamentos</span><b>${remEntries.length}</b></button></div>`;
  let panel='';
  if(txPanel==='acompanhamento')panel=`<div class="card tx-panel"><div class="section-title"><div><h3>Acompanhamento — ${periodTitle}</h3><span>${budgets.length} item(ns) exibido(s) · ${withBalance} com saldo · ${noBalance} esgotado(s)${negativeCount?' · '+negativeCount+' negativo(s)':''}</span></div></div>${txForecastFilterControls()}<div class="table-wrap tx-forecast-table"><table><thead><tr><th>Despesa</th><th>Previsto</th><th>Utilizado</th><th>Saldo</th></tr></thead><tbody>${forecastRows||'<tr><td colspan="4">Nenhuma previsão encontrada para os filtros atuais.</td></tr>'}</tbody></table></div></div>`;
  if(txPanel==='realizados')panel=`<div class="card tx-panel"><div class="section-title"><div><h3>Lançamentos realizados — ${periodTitle}</h3><span>${txList.length} item(ns) exibido(s) · ordem de inclusão preservada</span></div></div>${txRealizedFilterControls()}<div class="table-wrap tx-realized-table"><table><thead><tr><th>Data</th><th>Descrição</th><th>Categoria</th><th>Responsável/local</th><th>Cartão</th><th>Valor</th></tr></thead><tbody>${rows||'<tr><td colspan="6">Sem lançamentos realizados para os filtros atuais.</td></tr>'}</tbody></table></div></div>`;
  if(txPanel==='remanejamentos')panel=`<div class="card tx-panel"><div class="section-title"><div><h3>Remanejamentos — ${periodTitle}</h3><span>Transfira saldo entre despesas sem deixar a origem negativa.</span></div><button class="btn secondary" onclick="openRealloc()">Novo remanejamento</button></div><div class="table-wrap tx-rem-table"><table><thead><tr>${txScope==='ano'?'<th>Mês</th>':''}<th>Origem</th><th>Destino</th><th>Valor</th><th>Observação</th><th></th></tr></thead><tbody>${rem||'<tr><td colspan="6">Sem remanejamentos.</td></tr>'}</tbody></table></div></div>`;
  layout(`<div class="head tx-head"><div><h2>Lançamentos</h2><p>Previsões e realizados possuem filtros próprios e independentes.</p></div><div class="actions"><button class="btn" onclick="openTx()">Novo lançamento</button></div></div><div class="card tx-filter-card tx-period-card"><div class="section-title"><h3>Período</h3><span>A tela abre automaticamente no mês atual</span></div>${txPeriodControls()}</div><div class="tx-summary"><div class="tx-summary-card planned"><span>Previsto</span><strong>${fmt(plannedTotal)}</strong></div><div class="tx-summary-card used"><span>Utilizado</span><strong>${fmt(usedTotal)}</strong></div><div class="tx-summary-card balance"><span>Saldo</span><strong class="${openTotal<0?'neg':'pos'}">${fmt(openTotal)}</strong></div></div>${tabs}${panel}`)
}
function renderEstrategia(){
  const list=periodMonths();
  const totalReal=list.reduce((s,m)=>s+expenseTotal(m),0);
  const totalRec=list.reduce((s,m)=>s+revenueTotal(m),0);
  const totalBudget=list.reduce((s,m)=>s+plannedExpenseTotal(m),0);
  const saldoProjetado=totalRec-totalBudget;
  const saldoReal=totalRec-totalReal;
  const pendente=totalBudget-totalReal;
  const execPct=totalBudget?totalReal/totalBudget*100:0;
  const catTotals=state.categories.map(c=>({id:c.id,name:c.name,color:c.color,total:list.reduce((s,m)=>s+(state.budgets[m]||[]).filter(b=>b.cat===c.id).reduce((a,b)=>a+Number(b.planned||0),0),0),real:list.reduce((s,m)=>s+txs(m).filter(t=>t.cat===c.id).reduce((a,t)=>a+Number(t.amount||0),0),0)})).filter(x=>x.total>0||x.real>0).sort((a,b)=>b.total-a.total);
  const maxCat=Math.max(...catTotals.map(x=>Math.max(x.total,x.real)),1);
  const catBars=catTotals.map(x=>`<div class="hbar-row executive-row"><div class="hbar-name"><span class="row-accent" style="background:${x.color}"></span>${shortLabel(x.name)}</div><div class="hbar-track dual"><div class="hbar-fill budget-fill" style="--bar-color:${x.color};width:${Math.max(2,x.total/maxCat*100)}%"></div><div class="hbar-fill actual-fill" style="width:${Math.max(0,x.real/maxCat*100)}%"></div></div><div class="hbar-value"><b style="color:${x.color}">${fmt(x.total)}</b><small>Real: ${fmt(x.real)}</small></div></div>`).join('');
  const ownerTotals={cicero:0,nilce:0,comp:0};
  list.forEach(m=>(state.budgets[m]||[]).forEach(b=>{const city=b.city||cityOf(b.sub||'');const val=Number(b.planned||0);if(city==='Fortaleza')ownerTotals.cicero+=val;else if(city==='Brasília')ownerTotals.nilce+=val;else ownerTotals.comp+=val;}));
  const ownerTotal=ownerTotals.cicero+ownerTotals.nilce+ownerTotals.comp;
  const monthly=list.map(m=>({m,real:expenseTotal(m),budget:plannedExpenseTotal(m),rec:revenueTotal(m)}));
  const maxMonth=Math.max(...monthly.map(x=>Math.max(x.budget,x.real,x.rec)),1);
  const trend=monthly.map(x=>{const saldo=x.rec-x.budget;return `<div class="mini-bar executive-trend"><span class="mini-value">${fmt(x.budget)}</span><i style="height:${Math.max(4,x.budget/maxMonth*100)}%"></i><b>${labelMonth(x.m).slice(0,3)}</b><small class="${saldo>=0?'pos':'neg'}">${fmt(saldo)}</small></div>`}).join('');
  const compareChart=monthly.map(x=>{const dif=x.budget-x.real;return `<div class="compare-bar-group"><div class="compare-bars"><div class="compare-bar-wrap"><span class="compare-bar-value">${fmt(x.budget)}</span><div class="compare-bar budget" style="height:${Math.max(6,x.budget/maxMonth*100)}%"></div><span class="compare-bar-label">Orçado</span></div><div class="compare-bar-wrap"><span class="compare-bar-value">${fmt(x.real)}</span><div class="compare-bar actual" style="height:${Math.max(6,x.real/maxMonth*100)}%"></div><span class="compare-bar-label">Realizado</span></div></div><span class="compare-month">${labelMonth(x.m).slice(0,3)}</span><small class="compare-diff ${dif>=0?'pos':'neg'}">${dif>=0?'Livre ':'Estouro '}${fmt(Math.abs(dif))}</small></div>`}).join('');
  const rows=list.map(m=>{const r=revenueTotal(m),e=plannedExpenseTotal(m),real=expenseTotal(m),b=r-e,exec=e?real/e*100:0;return `<tr><td>${labelMonth(m)}</td><td>${fmt(r)}</td><td>${fmt(e)}</td><td>${fmt(real)}</td><td class="${b>=0?'pos':'neg'}">${fmt(b)}</td><td>${pct(e,r)}</td><td>${exec.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})}%</td></tr>`}).join('');
  layout(`<div class="head executive-head"><div><h2>Visão Gerencial</h2><p>Painel executivo do período: orçamento, execução, saldo projetado, composição por categoria e comparação orçado x realizado.</p></div></div><div class="card"><div class="section-title"><h3>Filtros</h3><span>Período, ano e mês</span></div><div class="filterbar">${compareControls()}${yearSelectHTML()}${monthSelectHTML()}</div></div><div class="executive-kpis"><div class="exec-card revenue"><span>Receita do período</span><strong>${fmt(totalRec)}</strong><small>${periodLabel()}</small></div><div class="exec-card budget"><span>Orçado</span><strong>${fmt(totalBudget)}</strong><small>${pct(totalBudget,totalRec)} da receita</small></div><div class="exec-card actual"><span>Realizado</span><strong>${fmt(totalReal)}</strong><small>${execPct.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})}% do orçado</small></div><div class="exec-card balance"><span>Saldo projetado</span><strong class="${saldoProjetado>=0?'pos':'neg'}">${fmt(saldoProjetado)}</strong><small>Receita menos orçamento</small></div><div class="exec-card pending"><span>A realizar</span><strong class="${pendente>=0?'pos':'neg'}">${fmt(pendente)}</strong><small>Orçado menos realizado</small></div><div class="exec-card real"><span>Saldo real parcial</span><strong class="${saldoReal>=0?'pos':'neg'}">${fmt(saldoReal)}</strong><small>Receita menos realizado</small></div></div><div class="executive-grid"><div class="strategy-card chart-card"><div class="section-title"><h3>Orçado x realizado</h3><span>Comparativo mensal com rótulos e diferença</span></div><div class="legend"><span class="legend-item"><i class="legend-dot budget"></i> Orçado</span><span class="legend-item"><i class="legend-dot actual"></i> Realizado</span></div><div class="compare-chart executive-chart">${compareChart}</div></div><div class="strategy-card chart-card"><div class="section-title"><h3>Composição por categoria</h3><span>Barra cheia = orçado · barra escura = realizado</span></div><div class="hbar-list executive-bars">${catBars||'<div class="empty">Sem categorias no período.</div>'}</div></div></div><div class="strategy-grid"><div class="strategy-card"><div class="section-title"><h3>Cícero/Fortaleza x Nilce/Brasília</h3><span>Distribuição do previsto por local/responsável</span></div><div class="split-wrap"><div class="split-card c-card"><h4>Cícero · Fort.</h4><strong>${fmt(ownerTotals.cicero)}</strong><span>${pct(ownerTotals.cicero,ownerTotal)} do total</span></div><div class="split-card n-card"><h4>Nilce · Bras.</h4><strong>${fmt(ownerTotals.nilce)}</strong><span>${pct(ownerTotals.nilce,ownerTotal)} do total</span></div><div class="split-card s-card"><h4>Compartil.</h4><strong>${fmt(ownerTotals.comp)}</strong><span>${pct(ownerTotals.comp,ownerTotal)} do total</span></div></div></div><div class="strategy-card"><div class="section-title"><h3>Evolução mensal do orçamento</h3><span>Valor orçado e saldo projetado por mês</span></div><div class="mini-trend executive-mini">${trend}</div></div></div><div class="card" style="margin-top:16px"><div class="section-title"><h3>Detalhamento gerencial</h3><span>${periodLabel()}</span></div><div class="table-wrap manager-table"><table><thead><tr><th>Mês</th><th>Receita</th><th>Orçamento</th><th>Realizado</th><th>Saldo Projetado</th><th>Desp./Rec.</th><th>Execução</th></tr></thead><tbody>${rows}</tbody></table></div></div>`)
}
function renderConfig(){const catRows=state.categories.slice().sort((a,b)=>textCmp(a.name,b.name)).map(c=>`<tr><td><span class="cat-tag" style="background:${c.color}18;color:${c.color}"><span class="row-accent" style="background:${c.color}"></span>${c.name}</span></td><td>${c.id}</td><td>${(state.subs[c.id]||[]).length}</td><td><button class="tiny" onclick="openCategory('${c.id}')">Editar</button> <button class="tiny" onclick="openSubcategory('${c.id}')">Nova subcategoria</button></td></tr>`).join('');const subRows=state.categories.slice().sort((a,b)=>textCmp(a.name,b.name)).flatMap(c=>(state.subs[c.id]||[]).slice().sort(textCmp).map(sub=>`<tr><td>${c.name}</td><td>${sub}</td><td><button class="tiny" onclick="openSubcategory('${c.id}','${encodeURIComponent(sub)}')">Editar</button></td></tr>`)).join('');layout(`<div class="head"><div><h2>Configurações</h2><p>Backup, anos, categorias e subcategorias.</p></div><div class="actions"><button class="btn" onclick="openCreateYear('config')">Criar novo ano</button><button class="btn secondary" onclick="openCategory()">Nova categoria</button></div></div><div class="grid cols2"><div class="card"><div class="section-title"><h3>Backup</h3><span>JSON</span></div><div class="actions" style="justify-content:flex-start"><button class="btn" onclick="exportJSON()">Exportar JSON</button><label class="btn secondary">Importar JSON<input type="file" accept="application/json" style="display:none" onchange="importJSON(event)"></label></div></div><div class="card"><div class="section-title"><h3>Anos disponíveis</h3><span>${years().join(', ')}</span></div><div class="actions" style="justify-content:flex-start"><button class="btn secondary" onclick="openCreateYear('config')">Criar ano</button><button class="btn danger" onclick="resetData()">Restaurar base inicial</button></div></div></div><div class="card" style="margin-top:16px"><div class="section-title"><h3>Categorias</h3><span>Editar ou criar categorias</span></div><div class="table-wrap"><table><thead><tr><th>Categoria</th><th>ID</th><th>Subcategorias</th><th>Ações</th></tr></thead><tbody>${catRows}</tbody></table></div></div><div class="card" style="margin-top:16px"><div class="section-title"><h3>Subcategorias</h3><span>Editar ou criar subcategorias por categoria</span></div><div class="table-wrap"><table><thead><tr><th>Categoria</th><th>Subcategoria</th><th>Ações</th></tr></thead><tbody>${subRows||'<tr><td colspan="3">Sem subcategorias</td></tr>'}</tbody></table></div></div>`)} function render(){({receitas:renderReceitas,despesas:renderDespesas,rxd:renderRxD,lancamentos:renderLancamentos,estrategia:renderEstrategia,config:renderConfig}[view]||renderReceitas)()}
function modal(html){document.getElementById('modal').innerHTML=`<div class="sheet">${html}</div>`;document.getElementById('modal').classList.add('open')}function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('modal').innerHTML=''}function catOptions(sel=''){return state.categories.slice().sort((a,b)=>textCmp(a.name,b.name)).map(c=>`<option value="${c.id}" ${c.id===sel?'selected':''}>${c.name}</option>`).join('')}function subOptions(catId,sel=''){return (state.subs[catId]||[]).slice().sort(textCmp).map(s=>`<option value="${s}" ${s===sel?'selected':''}>${s}</option>`).join('')}
function openRevenue(m){editRevenueMonth=m;const r=revObj(m);modal(`<div class="sheet-head"><h3>Editar receitas — ${labelMonth(m)}</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveRevenue(event)"><div class="form three"><div class="field"><label>Cícero</label><input type="number" step="0.01" name="cicero" value="${r.cicero||0}"></div><div class="field"><label>Nilce</label><input type="number" step="0.01" name="nilce" value="${r.nilce||0}"></div><div class="field"><label>Resgate Reserva</label><input type="number" step="0.01" name="reserva" value="${r.reserva||0}"></div></div><div class="actions"><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar</button></div></form>`)} function saveRevenue(e){e.preventDefault();const f=new FormData(e.target);state.revenues[editRevenueMonth]={cicero:+f.get('cicero')||0,nilce:+f.get('nilce')||0,reserva:+f.get('reserva')||0};save();closeModal();render()}
function openBudgetItem(id,m=state.month){editBudgetMonth=m;const b=(state.budgets[m]||[]).find(x=>x.id===id);if(!b)return;const city=b.city||cityOf(b.sub||'');modal(`<div class="sheet-head"><h3>Editar despesa — ${labelMonth(m)}</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveBudgetItem(event,'${id}')"><div class="form two"><div class="field"><label>Categoria</label><select name="cat">${catOptions(b.cat)}</select></div><div class="field"><label>Subcategoria</label><input name="sub" value="${cleanName(b.sub||'').replaceAll('"','&quot;')}"></div><div class="field"><label>Cidade</label><select name="city"><option ${city==='Fortaleza'?'selected':''}>Fortaleza</option><option ${city==='Brasília'?'selected':''}>Brasília</option><option ${city==='Compartilhado'?'selected':''}>Compartilhado</option></select></div><div class="field"><label>Valor</label><input type="number" step="0.01" name="planned" value="${b.planned||0}"></div></div><div class="note">Responsável será definido automaticamente pela cidade: Fortaleza = Cícero, Brasília = Nilce, Compartilhado = Compartilhado.</div><div class="actions"><button class="btn danger" type="button" onclick="deleteBudgetItem('${id}')">Excluir</button><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar</button></div></form>`)} function saveBudgetItem(e,id){e.preventDefault();const f=new FormData(e.target);const m=editBudgetMonth||state.month;const arr=state.budgets[m]||[];const b=arr.find(x=>x.id===id);if(b){const city=f.get('city');b.cat=f.get('cat');b.sub=cleanName(f.get('sub'))+' - '+city;b.city=city;b.planned=+f.get('planned')||0}save();closeModal();render()} function deleteBudgetItem(id){const m=editBudgetMonth||state.month;if(!confirm('Excluir esta despesa?'))return;state.budgets[m]=(state.budgets[m]||[]).filter(x=>x.id!==id);save();closeModal();render()}
function openBudget(){const rows=state.categories.map(c=>`<div class="field"><label>${c.name}</label><input type="number" step="0.01" name="${c.id}" value="${budgetBase(state.month,c.id)}"><small class="muted">Ajustado após remanejamento: ${fmt(budgetAdjusted(state.month,c.id))}</small></div>`).join('');modal(`<div class="sheet-head"><h3>Editar orçamento base — ${labelMonth(state.month)}</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveBudget(event)"><div class="form two">${rows}</div><div class="actions"><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar</button></div></form>`)} function saveBudget(e){e.preventDefault();const f=new FormData(e.target);state.budgets[state.month]=state.categories.map(c=>({cat:c.id,planned:+f.get(c.id)||0}));save();closeModal();render()}
function openTx(id){editTxId=id||null;let raw=null;if(id){for(const m of months()){raw=(state.transactions[m]||[]).find(x=>x.id===id);if(raw)break}}const today=new Date().toISOString().slice(0,10),defaultDate=today.slice(0,7)===state.month?today:state.month+'-01';const defaultCat=state.categories.slice().sort((a,b)=>textCmp(a.name,b.name))[0].id;const t=raw?{...raw,description:raw.description||raw.desc||'',responsible:raw.responsible||ownerOf(raw.city||cityOf(raw.sub||'')),city:raw.city||cityOf(raw.sub||''),card:cardOf(raw.card)}:{date:defaultDate,description:'',cat:defaultCat,sub:'',responsible:'Cícero',city:'Fortaleza',card:'-',amount:0};modal(`<div class="sheet-head"><h3>${id?'Editar':'Novo'} lançamento</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveTx(event)"><div class="form two"><div class="field"><label>Data</label><input type="date" name="date" value="${t.date||''}"></div><div class="field"><label>Descrição</label><input name="description" value="${(t.description||'').replaceAll('"','&quot;')}"></div><div class="field"><label>Categoria</label><select name="cat" onchange="refreshSub(this.value)">${catOptions(t.cat)}</select></div><div class="field"><label>Subcategoria</label><select name="sub" id="subselect">${subOptions(t.cat,t.sub)}</select></div><div class="field"><label>Responsável</label><select name="responsible"><option ${t.responsible==='Cícero'?'selected':''}>Cícero</option><option ${t.responsible==='Nilce'?'selected':''}>Nilce</option><option ${t.responsible==='Compartilhado'?'selected':''}>Compartilhado</option></select></div><div class="field"><label>Cidade</label><select name="city"><option ${t.city==='Fortaleza'?'selected':''}>Fortaleza</option><option ${t.city==='Brasília'?'selected':''}>Brasília</option><option ${t.city==='Compartilhado'?'selected':''}>Compartilhado</option></select></div><div class="field"><label>Cartão</label><input name="card" value="${cardOf(t.card)}"></div><div class="field"><label>Valor</label><input type="number" step="0.01" name="amount" value="${t.amount||0}"></div></div><div class="actions">${id?'<button class="btn danger" type="button" onclick="deleteTx()">Excluir</button>':''}<button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar</button></div></form>`)} function refreshSub(catId){document.getElementById('subselect').innerHTML=subOptions(catId)} function saveTx(e){e.preventDefault();const f=new FormData(e.target),date=f.get('date')||state.month+'-01',m=date.slice(0,7),catId=f.get('cat'),sub=f.get('sub'),city=f.get('city'),amount=+f.get('amount')||0;if(amount<=0)return alert('Informe um valor maior que zero.');if(!state.transactions[m])state.transactions[m]=[];let existing=null,existingMonth=null,existingIndex=-1;for(const mm of months()){const i=(state.transactions[mm]||[]).findIndex(x=>x.id===editTxId);if(i>=0){existing=state.transactions[mm][i];existingMonth=mm;existingIndex=i;break}}const snap=txBudgetSnapshot(m,catId,sub,city);const sameTarget=existing&&existingMonth===m&&sameBudgetTarget(existing,catId,sub,city);const proposedUsed=snap.used-(sameTarget?Number(existing.amount||0):0)+amount;const proposedBalance=snap.planned-proposedUsed;const currentBalance=snap.balance;if(proposedBalance<-.005&&proposedBalance<currentBalance-.005){const available=Math.max(0,snap.planned-(snap.used-(sameTarget?Number(existing.amount||0):0)));return alert(`Este lançamento deixaria o saldo negativo.\n\nSaldo disponível: ${Number(available).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}\nValor informado: ${Number(amount).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}\n\nAumente a previsão ou faça um remanejamento antes de lançar.`)}const createdAt=(existing&&existing.createdAt)||new Date().toISOString();const obj={id:editTxId||('tx_'+Date.now()),date,desc:f.get('description'),description:f.get('description'),cat:catId,sub,payer:ownerOf(city),responsible:ownerOf(city),city,card:cardOf(f.get('card')),amount,createdAt,updatedAt:new Date().toISOString()};if(existing&&existingMonth===m){state.transactions[m][existingIndex]=obj}else{if(existing){state.transactions[existingMonth].splice(existingIndex,1)}state.transactions[m].push(obj)}state.month=m;txScope='mes';txPanel='realizados';txRealizedFilters={cat:'todos',owner:'todos',city:'todos'};save();closeModal();render()} function deleteTx(){if(!confirm('Excluir este lançamento?'))return;for(const m of months()){const arr=state.transactions[m]||[];const i=arr.findIndex(x=>x.id===editTxId);if(i>=0)arr.splice(i,1)}save();closeModal();render()}
function reallocLineOptions(m,selected=''){return (state.budgets[m]||[]).slice().sort(compareExpenseItems).map(b=>{const city=b.city||cityOf(b.sub||''),used=budgetLineUsed(m,b),balance=budgetLineAdjusted(m,b)-used;return `<option value="${b.id}" ${b.id===selected?'selected':''}>${cat(b.cat).name} — ${cleanName(b.sub)} — ${shortLabel(city)} — saldo ${Number(balance).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</option>`}).join('')}
function openRealloc(){const options=reallocLineOptions(state.month);if(!options)return alert('Não há despesas previstas neste mês.');modal(`<div class="sheet-head"><h3>Remanejar saldo — ${labelMonth(state.month)}</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveRealloc(event)"><div class="form two"><div class="field"><label>Despesa de origem</label><select name="fromBudgetId">${options}</select></div><div class="field"><label>Despesa de destino</label><select name="toBudgetId">${options}</select></div><div class="field"><label>Valor</label><input type="number" step="0.01" name="amount" value="0"></div><div class="field"><label>Observação</label><input name="note" placeholder="Ex.: reforço em supermercado"></div></div><div class="note">O valor sai da previsão da despesa de origem e entra na despesa de destino. A origem não poderá ficar com saldo negativo.</div><div class="actions"><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar remanejamento</button></div></form>`)}
function saveRealloc(e){e.preventDefault();const f=new FormData(e.target),fromId=f.get('fromBudgetId'),toId=f.get('toBudgetId'),amount=+f.get('amount')||0,arr=state.budgets[state.month]||[],fromB=arr.find(b=>b.id===fromId),toB=arr.find(b=>b.id===toId);if(!fromB||!toB)return alert('Selecione despesas válidas.');if(fromId===toId)return alert('Origem e destino precisam ser diferentes.');if(amount<=0)return alert('Informe um valor maior que zero.');const available=budgetLineAdjusted(state.month,fromB)-budgetLineUsed(state.month,fromB);if(amount>available+.005)return alert(`O valor é maior que o saldo disponível na origem.\n\nDisponível: ${Number(Math.max(0,available)).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}`);if(!state.reallocations[state.month])state.reallocations[state.month]=[];state.reallocations[state.month].push({id:'re_'+Date.now(),fromBudgetId:fromId,toBudgetId:toId,from:fromB.cat,to:toB.cat,amount,note:f.get('note')||'',createdAt:new Date().toISOString()});txPanel='acompanhamento';save();closeModal();render()}
function deleteRealloc(id,m=state.month){if(!confirm('Excluir remanejamento?'))return;state.reallocations[m]=(state.reallocations[m]||[]).filter(r=>r.id!==id);save();render()}

function openCreateYear(origin='config'){const next=(Math.max(...years().map(y=>+y))+1)||new Date().getFullYear();modal(`<div class="sheet-head"><h3>Criar novo ano</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveNewYear(event,'${origin}')"><div class="form two"><div class="field"><label>Ano</label><input type="number" name="year" min="2020" max="2100" value="${next}"></div><div class="field"><label>Base para preencher</label><select name="copy"><option value="">Ano em branco</option>${years().map(y=>`<option value="${y}">Copiar estrutura de ${y}</option>`).join('')}</select></div></div><div class="note">O ano será criado com janeiro a dezembro. Depois você pode preencher receitas e despesas nas próprias visões.</div><div class="actions"><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Criar ano</button></div></form>`)} function saveNewYear(e,origin){e.preventDefault();const f=new FormData(e.target),y=String(f.get('year')).trim();if(!/^\d{4}$/.test(y))return alert('Informe um ano válido.');if(months().some(m=>m.startsWith(y)))return alert('Este ano já existe.');const copy=f.get('copy');for(let i=1;i<=12;i++){const id=y+'-'+String(i).padStart(2,'0');state.months.push({id,label:monthNameFull(i),short:monthShort(i)});state.revenues[id]={cicero:0,nilce:0,reserva:0};state.budgets[id]=[];state.transactions[id]=[];state.reallocations[id]=[];if(copy){const old=copy+'-'+String(i).padStart(2,'0');state.budgets[id]=(state.budgets[old]||[]).map(b=>({...b,id:'b_'+Date.now()+'_'+Math.random().toString(36).slice(2),planned:0}));}}
state.months.sort((a,b)=>a.id.localeCompare(b.id));state.month=y+'-01';save();closeModal();if(origin==='receitas')openFillRevenues();else if(origin==='despesas')openNewBudgetLine();else render()} 
function openFillRevenues(){const y=state.month.slice(0,4),list=months().filter(m=>m.startsWith(y));const rows=list.map(m=>{const r=revObj(m);return `<tr><td>${labelMonth(m)}</td><td><input type="number" step="0.01" name="${m}_c" value="${r.cicero||0}"></td><td><input type="number" step="0.01" name="${m}_n" value="${r.nilce||0}"></td><td><input type="number" step="0.01" name="${m}_r" value="${r.reserva||0}"></td></tr>`}).join('');modal(`<div class="sheet-head"><h3>Preencher receitas — ${y}</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveFillRevenues(event)"><div class="table-wrap"><table><thead><tr><th>Mês</th><th>Cícero</th><th>Nilce</th><th>Resgate reserva</th></tr></thead><tbody>${rows}</tbody></table></div><div class="actions"><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar receitas</button></div></form>`)} function saveFillRevenues(e){e.preventDefault();const f=new FormData(e.target),y=state.month.slice(0,4);months().filter(m=>m.startsWith(y)).forEach(m=>{state.revenues[m]={cicero:+f.get(m+'_c')||0,nilce:+f.get(m+'_n')||0,reserva:+f.get(m+'_r')||0}});save();closeModal();render()}
function openNewBudgetLine(){const y=state.month.slice(0,4),list=months().filter(m=>m.startsWith(y));const inputs=list.map(m=>`<div class="field"><label>${labelMonth(m)}</label><input type="number" step="0.01" name="${m}" value="0"></div>`).join('');modal(`<div class="sheet-head"><h3>Nova despesa prevista — ${y}</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveNewBudgetLine(event)"><div class="form two"><div class="field"><label>Categoria</label><select name="cat" onchange="refreshSub(this.value)">${catOptions()}</select></div><div class="field"><label>Subcategoria</label><input name="sub" placeholder="Ex.: Supermercado"></div><div class="field"><label>Cidade</label><select name="city"><option>Fortaleza</option><option>Brasília</option><option>Compartilhado</option></select></div></div><div class="section-title" style="margin-top:8px"><h3>Valores por mês</h3><span>Preencha somente os meses necessários</span></div><div class="form three">${inputs}</div><div class="actions"><button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar despesa prevista</button></div></form>`)} function saveNewBudgetLine(e){e.preventDefault();const f=new FormData(e.target),catId=f.get('cat'),city=f.get('city'),subClean=cleanName(f.get('sub')||cat(catId).name),sub=subClean+' - '+city,y=state.month.slice(0,4);if(!state.subs[catId])state.subs[catId]=[];if(!state.subs[catId].includes(sub))state.subs[catId].push(sub);months().filter(m=>m.startsWith(y)).forEach(m=>{const val=+f.get(m)||0;if(val>0){if(!state.budgets[m])state.budgets[m]=[];state.budgets[m].push({id:'b_'+Date.now()+'_'+Math.random().toString(36).slice(2),cat:catId,sub,city,planned:val})}});save();closeModal();render()}
function slugify(txt){return String(txt||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||('cat_'+Date.now())} function openCategory(id=''){const c=id?cat(id):{id:'',name:'',color:'#2563EB'};modal(`<div class="sheet-head"><h3>${id?'Editar':'Nova'} categoria</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveCategory(event,'${id}')"><div class="form two"><div class="field"><label>Nome</label><input name="name" value="${(c.name||'').replaceAll('"','&quot;')}" required></div><div class="field"><label>Cor</label><input type="color" name="color" value="${c.color||'#2563EB'}"></div></div><div class="actions">${id?'<button class="btn danger" type="button" onclick="deleteCategory(\''+id+'\')">Excluir</button>':''}<button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar</button></div></form>`)} function saveCategory(e,id){e.preventDefault();const f=new FormData(e.target),name=String(f.get('name')||'').trim(),color=f.get('color')||'#2563EB';if(!name)return; if(id){const c=state.categories.find(x=>x.id===id);if(c){c.name=name;c.color=color}}else{let newId=slugify(name),i=2;while(state.categories.some(c=>c.id===newId))newId=slugify(name)+'_'+i++;state.categories.push({id:newId,name,icon:name,color});state.subs[newId]=[]}save();closeModal();render()} function deleteCategory(id){if(!confirm('Excluir categoria? Os lançamentos antigos podem ficar sem classificação.'))return;state.categories=state.categories.filter(c=>c.id!==id);delete state.subs[id];save();closeModal();render()}
function openSubcategory(catId,enc=''){const old=enc?decodeURIComponent(enc):'';modal(`<div class="sheet-head"><h3>${old?'Editar':'Nova'} subcategoria</h3><button class="close" onclick="closeModal()">×</button></div><form class="form" onsubmit="saveSubcategory(event,'${catId}','${encodeURIComponent(old)}')"><div class="form two"><div class="field"><label>Categoria</label><select name="cat">${catOptions(catId)}</select></div><div class="field"><label>Subcategoria</label><input name="sub" value="${old.replaceAll('"','&quot;')}" required></div></div><div class="actions">${old?'<button class="btn danger" type="button" onclick="deleteSubcategory(\''+catId+'\',\''+encodeURIComponent(old)+'\')">Excluir</button>':''}<button class="btn secondary" type="button" onclick="closeModal()">Cancelar</button><button class="btn">Salvar</button></div></form>`)} function saveSubcategory(e,catId,encOld){e.preventDefault();const f=new FormData(e.target),newCat=f.get('cat'),sub=String(f.get('sub')||'').trim(),old=decodeURIComponent(encOld||'');if(!sub)return;if(!state.subs[newCat])state.subs[newCat]=[];if(old&&state.subs[catId])state.subs[catId]=state.subs[catId].filter(x=>x!==old);if(!state.subs[newCat].includes(sub))state.subs[newCat].push(sub);save();closeModal();render()} function deleteSubcategory(catId,enc){const old=decodeURIComponent(enc);if(!confirm('Excluir subcategoria?'))return;state.subs[catId]=(state.subs[catId]||[]).filter(x=>x!==old);save();closeModal();render()}
function exportJSON(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='backup-financas-cicero-nilce.json';a.click()} function importJSON(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{state=merge(clone(baseData),JSON.parse(reader.result));save();render();alert('Backup importado.')}catch(err){alert('Arquivo inválido.')}};reader.readAsText(file)} function resetData(){if(!confirm('Restaurar a base inicial? Isso apaga edições locais.'))return;localStorage.removeItem(storeKey);state=clone(baseData);save();render()}
render();initCloud();
